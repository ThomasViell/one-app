# DrainQ ONE — Update-Mirror location block
# Insert into the existing server block for updates.drainq.de
# (MARKER_HOSTING: SUBPATH — no separate vhost, no additional TLS cert needed)
#
# Example inclusion:
#   server {
#       server_name updates.drainq.de;
#       ...
#       include /etc/nginx/snippets/drainq-one.conf;
#       ...
#   }

location /one/ {
    alias /var/www/drainq-updates/one/;
    autoindex off;

    # Deny directory listing and hidden files
    location ~ /\. {
        deny all;
    }

    # Immutable release binaries — long-lived cache
    location ~* /one/.*\.(apk|nupkg|exe|zip)$ {
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }

    # Manifests and checksums — never cache (clients must see latest version)
    location ~* /one/(RELEASES.*|.*\.json|.*\.sha256)$ {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri =404;
    }
}
